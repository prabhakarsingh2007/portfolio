<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">KharchaGraph Logo</title>
  <desc id="desc">Green circular logo with KG monogram and growth bars.</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="bars" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <circle cx="120" cy="120" r="108" fill="#ffffff" stroke="url(#ring)" stroke-width="10"/>

  <rect x="52" y="126" width="18" height="42" rx="4" fill="url(#bars)"/>
  <rect x="76" y="112" width="18" height="56" rx="4" fill="url(#bars)"/>
  <rect x="100" y="96" width="18" height="72" rx="4" fill="url(#bars)"/>

  <path d="M52 108c16 0 28-6 38-18" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round"/>
  <path d="M86 86l16-2-6 15" fill="none" stroke="#15803d" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="122" y="131" font-size="46" font-family="Verdana, sans-serif" font-weight="700" fill="#15803d">KG</text>
</svg>
